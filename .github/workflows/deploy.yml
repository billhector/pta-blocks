name: Deploy pta-blocks to Dreamhost

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pta-blocks
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DREAMHOST_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DREAMHOST_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull latest on Dreamhost
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              ${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }} \
              "cd ~/propertytaxappealguides.com/wp-content/themes/pta-blocks && \
               git fetch --depth=1 origin main && \
               git reset --hard origin/main && \
               git rev-parse --short HEAD"

      - name: Notify deployment hash
        run: echo "Deployed pta-blocks to Dreamhost at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
